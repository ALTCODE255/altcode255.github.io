<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="darkreader-lock">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALT255 | {{ page.title }}</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/styles/{{ page.style_css }}" rel="stylesheet">
    <meta name="title" property="og:title" content="{{ page.title }}">
    {% if page.description %}
    <meta name="description" property="og:description" content="{{ page.description }}">
    {% endif %}

    <noscript>Please enable JavaScript on this site for header navigation.
        <hr>
    </noscript>
</head>

<body>
    <header>
        {% include header.html %}
    </header>
    <main class="animate-in container-fluid p-2" id="content">
        {{ content }}
    </main>
    <footer class="text-center">
        {% include footer.html %}
        <script src="/scripts/footer.js"></script>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
    </script>
</body>

</html>
